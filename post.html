<script>
// ─────────────────────────────────────────────
// FRONTMATTER PARSER
// ─────────────────────────────────────────────
function parseFrontmatter(text) {
  const match = text.match(/^---\n([\s\S]*?)\n---\n([\s\S]*)$/);
  if (!match) return { meta: {}, body: text };
  const meta = {};
  match[1].split('\n').forEach(line => {
    const idx = line.indexOf(':');
    if (idx === -1) return;
    meta[line.slice(0,idx).trim()] = line.slice(idx+1).trim();
  });
  return { meta, body: match[2].trim() };
}

function estimateReadTime(text) {
  return Math.max(1, Math.round(text.trim().split(/\s+/).length / 200));
}

function formatDateFull(dateStr) {
  const d = new Date(dateStr);
  if (isNaN(d)) return dateStr;
  return d.toLocaleDateString('en-GB', { day:'numeric', month:'long', year:'numeric' });
}

// ─────────────────────────────────────────────
// MARKDOWN RENDERER
// Supports: h2 h3 p strong em code pre(lang) ul ol blockquote hr
//           images GIFs  ![alt](src)
//           figures      ![alt](src "caption")
//           video mp4    @[video](src)
//           youtube      @[youtube](VIDEO_ID)
//           vimeo        @[vimeo](VIDEO_ID)
//           links        [text](url)
// ─────────────────────────────────────────────
function renderMarkdown(md) {
  const lines = md.split('\n');
  let html = '';
  let i = 0;
  let inList = null;
  let inPre  = false;
  let preLang = '';
  let preLines = [];

  function flushList() {
    if (!inList) return;
    html += `</${inList}>`;
    inList = null;
  }

  function flushPre() {
    if (!inPre) return;
    if (preLang === 'mermaid') {
      html += `<div class="mermaid">${preLines.join('\n')}</div>`;
    } else {
      const escaped = preLines.join('\n');
      const langClass = preLang ? ` class="language-${preLang}"` : '';
      const langAttr  = preLang ? ` data-lang="${preLang}"` : '';
      html += `<pre${langAttr}${langClass}><code${langClass}>${escaped}</code></pre>`;
    }
    preLines = []; preLang = ''; inPre = false;
  }

  function escapeHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function inline(text) {
    return text
      // Inline code (before other replacements)
      .replace(/`([^`]+)`/g, (_, c) => `<code>${escapeHtml(c)}</code>`)
      // Bold + italic combined
      .replace(/\*\*\*([^*]+)\*\*\*/g, '<strong><em>$1</em></strong>')
      // Bold
      .replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>')
      // Italic
      .replace(/\*([^*\n]+)\*/g, '<em>$1</em>')
      // Links — only allow safe URL schemes to prevent XSS
      .replace(/\[([^\]]+)\]\(([^)]+)\)/g, (_, text, url) => {
        const safe = /^(https?:\/\/|mailto:|\/|#)/.test(url.trim());
        return safe ? `<a href="${url.trim()}" target="_blank" rel="noopener noreferrer">${text}</a>` : text;
      });
  }

  function processMediaLine(line) {
    // @[youtube](ID)
    const yt = line.match(/^@\[youtube\]\(([^)]+)\)$/);
    if (yt) return `<div class="video-embed"><iframe src="https://www.youtube-nocookie.com/embed/${yt[1]}" allowfullscreen loading="lazy"></iframe></div>`;
    // @[vimeo](ID)
    const vi = line.match(/^@\[vimeo\]\(([^)]+)\)$/);
    if (vi) return `<div class="video-embed"><iframe src="https://player.vimeo.com/video/${vi[1]}" allowfullscreen loading="lazy"></iframe></div>`;
    // @[video](src)
    const vid = line.match(/^@\[video\]\(([^)]+)\)$/);
    if (vid) return `<video controls preload="metadata"><source src="${vid[1]}">Your browser does not support video.</video>`;
    // Image with caption: ![alt](src "caption")
    const imgCap = line.match(/^!\[([^\]]*)\]\(([^)"]+)\s+"([^"]+)"\)$/);
    if (imgCap) return `<figure><img src="${imgCap[2]}" alt="${imgCap[1]}" loading="lazy"><figcaption>${imgCap[3]}</figcaption></figure>`;
    // Plain image / GIF: ![alt](src)
    const img = line.match(/^!\[([^\]]*)\]\(([^)]+)\)$/);
    if (img) return `<img src="${img[2]}" alt="${img[1]}" loading="lazy">`;
    return null;
  }

  while (i < lines.length) {
    const line = lines[i];

    // ── Code fence ──
    const fenceMatch = line.match(/^```(\w*)$/);
    if (fenceMatch) {
      if (inPre) { flushPre(); }
      else { flushList(); inPre = true; preLang = fenceMatch[1].toLowerCase() || ''; }
      i++; continue;
    }
    if (inPre) { preLines.push(escapeHtml(line)); i++; continue; }

    // ── HR ──
    if (/^---+$/.test(line.trim())) { flushList(); html += '<hr>'; i++; continue; }

    // ── Headings ──
    if (line.startsWith('## '))  { flushList(); html += `<h2>${inline(line.slice(3))}</h2>`; i++; continue; }
    if (line.startsWith('### ')) { flushList(); html += `<h3>${inline(line.slice(4))}</h3>`; i++; continue; }

    // ── Blockquote ──
    if (line.startsWith('> ')) { flushList(); html += `<blockquote><p>${inline(line.slice(2))}</p></blockquote>`; i++; continue; }

    // ── Media lines (standalone) ──
    const media = processMediaLine(line.trim());
    if (media) { flushList(); html += media; i++; continue; }

    // ── Unordered list ──
    if (/^[-*] /.test(line)) {
      if (inList !== 'ul') { flushList(); html += '<ul>'; inList = 'ul'; }
      html += `<li>${inline(line.slice(2))}</li>`; i++; continue;
    }
    // ── Ordered list ──
    if (/^\d+\. /.test(line)) {
      if (inList !== 'ol') { flushList(); html += '<ol>'; inList = 'ol'; }
      html += `<li>${inline(line.replace(/^\d+\. /,''))}</li>`; i++; continue;
    }

    // ── Empty line ──
    if (line.trim() === '') { flushList(); i++; continue; }

    // ── Paragraph (merge consecutive non-special lines) ──
    flushList();
    let para = inline(line);
    while (
      i + 1 < lines.length &&
      lines[i+1].trim() !== '' &&
      !/^(#{1,3} |[-*] |\d+\. |> |```|@\[|!\[|---)/.test(lines[i+1])
    ) {
      i++;
      para += ' ' + inline(lines[i]);
    }
    html += `<p>${para}</p>`;
    i++;
  }
  flushList();
  flushPre();
  return html;
}

// LOAD + RENDER
// ─────────────────────────────────────────────
async function init() {
  const wrapper = document.getElementById('postWrapper');
  const slug    = new URLSearchParams(location.search).get('p');

  if (!slug) {
    wrapper.innerHTML = '<p style="font-family:var(--mono);color:var(--ink-faint);padding:4rem 0">// no post specified. <a href="blog.html" style="color:var(--terra)">← back to blog</a></p>';
    return;
  }

  try {
    const res = await fetch(`posts/${slug}.md`);
    if (!res.ok) throw new Error(res.status);
    const text = await res.text();
    const { meta, body } = parseFrontmatter(text);
    const readTime = estimateReadTime(body);
    const cat = (meta.category || 'uncategorised').toLowerCase();

    document.title = `${meta.title || slug} — thebiomedicalgeek.com`;
    document.querySelector('meta[property="og:title"]').setAttribute('content', `${meta.title || slug} — thebiomedicalgeek.com`);
    document.querySelector('meta[property="og:url"]').setAttribute('content', `https://thebiomedicalgeek.com/post.html?p=${slug}`);
    if (meta.excerpt) {
      document.querySelector('meta[name="description"]').setAttribute('content', meta.excerpt);
      document.querySelector('meta[property="og:description"]').setAttribute('content', meta.excerpt);
      document.querySelector('meta[name="twitter:description"]').setAttribute('content', meta.excerpt);
      document.querySelector('meta[name="twitter:title"]').setAttribute('content', `${meta.title || slug} — thebiomedicalgeek.com`);
    }

    wrapper.innerHTML = `
      <a href="blog.html" class="post-back">back to blog</a>
      <div class="post-category-badge">${cat}</div>
      <h1 class="post-title-main">${meta.title || slug}</h1>
      <div class="post-meta-header">
        <span class="post-meta-date">${formatDateFull(meta.date)}</span>
        <span>//</span>
        <span>~${readTime} min read</span>
      </div>
      <article class="post-body" id="postBody">${renderMarkdown(body)}</article>
      <div class="post-footer">
        <a href="blog.html" class="post-footer-back">back to blog</a>
        <span class="post-share">giulio quaglia · ${new Date(meta.date).getFullYear() || ''}</span>
      </div>`;

    // Run Prism on injected HTML
    if (window.Prism) Prism.highlightAllUnder(document.getElementById('postBody'));
    // Run Mermaid only if this post contains diagrams
    const mermaidNodes = document.querySelectorAll('#postBody .mermaid');
    if (mermaidNodes.length) {
      if (!window.__mermaid) {
        const { default: mermaid } = await import('https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.esm.min.mjs');
        mermaid.initialize({ startOnLoad: false, theme: 'dark' });
        window.__mermaid = mermaid;
      }
      await window.__mermaid.run({ nodes: mermaidNodes });
    }

  } catch(e) {
    wrapper.innerHTML = `<p style="font-family:var(--mono);color:var(--ink-faint);padding:4rem 0">// post not found. <a href="blog.html" style="color:var(--terra)">← back to blog</a></p>`;
  }
}

// Footer year
document.getElementById('yr').textContent = new Date().getFullYear();

// Mobile nav
const _navToggle = document.getElementById('navToggle');
const _navLinks  = document.getElementById('navLinks');
_navToggle.addEventListener('click', () => {
  const open = _navLinks.classList.toggle('open');
  _navToggle.setAttribute('aria-expanded', open);
});
_navLinks.querySelectorAll('a').forEach(a => a.addEventListener('click', () => {
  _navLinks.classList.remove('open');
  _navToggle.setAttribute('aria-expanded', 'false');
}));

init();
</script>
</body>
</html>
