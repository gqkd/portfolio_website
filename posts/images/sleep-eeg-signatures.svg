      495,245
      510,233
      519,240 528,233 537,226 546,233 555,240 564,233 573,226 582,233 591,240 600,233 609,226 619,233
    "/>

  <!-- Sleep spindle bracket -->
  <line x1="214" y1="264" x2="466" y2="264" stroke="#00D4FF" stroke-width="1" opacity="0.6"/>
  <line x1="214" y1="260" x2="214" y2="268" stroke="#00D4FF" stroke-width="1" opacity="0.6"/>
