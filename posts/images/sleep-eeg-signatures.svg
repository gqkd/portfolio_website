  <text x="502" y="210" font-family="'JetBrains Mono', monospace" font-size="8" fill="#f59e0b">K-complex</text>

  <!-- Right annotation -->
  <text x="628" y="224" font-family="'JetBrains Mono', monospace" font-size="9" fill="#94a3b8">most</text>
  <text x="628" y="235" font-family="'JetBrains Mono', monospace" font-size="9" fill="#94a3b8">abundant</text>
  <text x="628" y="246" font-family="'JetBrains Mono', monospace" font-size="9" fill="#94a3b8">stage</text>

