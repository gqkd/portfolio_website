  <line x1="100" y1="73"  x2="620" y2="73"  stroke="#1e2433" stroke-width="0.8"/>
  <line x1="100" y1="151" x2="620" y2="151" stroke="#1e2433" stroke-width="0.8"/>
  <line x1="100" y1="233" x2="620" y2="233" stroke="#1e2433" stroke-width="0.8"/>
