<svg width="800" height="422" viewBox="0 0 800 422" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="800" height="422" fill="#0d1117"/>

  <!-- Title -->
  <text x="400" y="24" text-anchor="middle"
    font-family="'JetBrains Mono', 'Courier New', monospace"
    font-size="13" fill="#e2d9c8" letter-spacing="0.5">
    EEG stage signatures &#x2014; 4-second schematic window
  </text>
  <line x1="0" y1="34" x2="800" y2="34" stroke="#1e2433" stroke-width="1"/>

  <!-- ===== ROW SEPARATORS ===== -->
  <line x1="0" y1="112" x2="800" y2="112" stroke="#1e2433" stroke-width="1"/>
  <line x1="0" y1="190" x2="800" y2="190" stroke="#1e2433" stroke-width="1"/>
  <line x1="0" y1="276" x2="800" y2="276" stroke="#1e2433" stroke-width="1"/>
  <line x1="0" y1="350" x2="800" y2="350" stroke="#1e2433" stroke-width="1"/>

  <!-- ===== ROW BACKGROUNDS (alternating) ===== -->
  <rect x="0" y="34"  width="800" height="78" fill="#0d1117"/>
  <rect x="0" y="112" width="800" height="78" fill="#0f1420"/>
  <rect x="0" y="190" width="800" height="86" fill="#0d1117"/>
  <rect x="0" y="276" width="800" height="74" fill="#0f1420"/>
  <rect x="0" y="350" width="800" height="72" fill="#0d1117"/>

  <!-- ===== STAGE LABELS (left column) ===== -->
  <!-- Wake -->
  <text x="10" y="69" font-family="'JetBrains Mono', monospace" font-size="11" fill="#e2d9c8" font-weight="bold">Wake</text>
  <text x="10" y="83" font-family="'JetBrains Mono', monospace" font-size="9" fill="#6b7280">Alpha (8-12 Hz)</text>
  <text x="10" y="95" font-family="'JetBrains Mono', monospace" font-size="9" fill="#6b7280">regular, relaxed</text>

  <!-- N1 -->
  <text x="10" y="147" font-family="'JetBrains Mono', monospace" font-size="11" fill="#94a3b8" font-weight="bold">N1</text>
  <text x="10" y="161" font-family="'JetBrains Mono', monospace" font-size="9" fill="#6b7280">Theta (4-7 Hz)</text>
  <text x="10" y="173" font-family="'JetBrains Mono', monospace" font-size="9" fill="#6b7280">lower amplitude</text>

  <!-- N2 -->
  <text x="10" y="226" font-family="'JetBrains Mono', monospace" font-size="11" fill="#94a3b8" font-weight="bold">N2</text>
  <text x="10" y="240" font-family="'JetBrains Mono', monospace" font-size="9" fill="#6b7280">Theta baseline +</text>
  <text x="10" y="252" font-family="'JetBrains Mono', monospace" font-size="9" fill="#6b7280">spindle + K-complex</text>
  <text x="10" y="264" font-family="'JetBrains Mono', monospace" font-size="9" fill="#6b7280">50% of night</text>

  <!-- N3 -->
  <text x="10" y="303" font-family="'JetBrains Mono', monospace" font-size="11" fill="#f59e0b" font-weight="bold">N3 SWS</text>
  <text x="10" y="317" font-family="'JetBrains Mono', monospace" font-size="9" fill="#6b7280">Delta (0.5-4 Hz)</text>
  <text x="10" y="329" font-family="'JetBrains Mono', monospace" font-size="9" fill="#6b7280">high amplitude, slow</text>

  <!-- REM -->
  <text x="10" y="378" font-family="'JetBrains Mono', monospace" font-size="11" fill="#818cf8" font-weight="bold">REM</text>
  <text x="10" y="392" font-family="'JetBrains Mono', monospace" font-size="9" fill="#6b7280">Mixed, low amplitude</text>
  <text x="10" y="404" font-family="'JetBrains Mono', monospace" font-size="9" fill="#6b7280">desynchronized</text>

