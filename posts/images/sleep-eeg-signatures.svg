  <polyline fill="none" stroke="#818cf8" stroke-width="1.5" stroke-linejoin="round"
    points="100,386 106,379 112,386 118,393 124,386 130,380 136,386 142,392 148,386 154,379 160,386 166,394 172,386 178,381 184,386 190,392 196,386 202,380 208,386 214,393 220,386 226,380 232,386 238,392 244,386 250,379 256,386 262,394 268,386 274,381 280,386 286,393 292,386 298,380 304,386 310,392 316,386 322,379 328,386 334,394 340,386 346,381 352,386 358,393 364,386 370,380 376,386 382,391 388,386 394,380 400,386 406,393 412,386 418,381 424,386 430,392 436,386 442,379 448,386 454,394 460,386 466,381 472,386 478,392 484,386 490,380 496,386 502,393 508,386 514,380 520,386 526,392 532,386 538,379 544,386 550,394 556,386 562,380 568,386 574,391 580,386 586,379 592,386 598,393 604,386 610,381 618,386"/>
  <!-- Right annotation -->
  <text x="628" y="380" font-family="'JetBrains Mono', monospace" font-size="9" fill="#818cf8">like wake,</text>
  <text x="628" y="391" font-family="'JetBrains Mono', monospace" font-size="9" fill="#818cf8">body paralyzed</text>

  <!-- ===== BOTTOM: 4-second scale bar ===== -->
  <line x1="100" y1="416" x2="620" y2="416" stroke="#2d3748" stroke-width="0.8"/>
  <text x="360" y="421" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="8" fill="#4a5568">&#x2190; schematic 4-second window &#x2192; &#xB7;&#xB7;&#xB7; AASM v3.0 staging criteria</text>
